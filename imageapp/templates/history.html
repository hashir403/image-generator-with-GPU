<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image History - AI Image Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #1c0b2b, #07172f);
      color: #fff;
      min-height: 100vh;
      margin: 0;
    }
    header {
      background: linear-gradient(to right, #1c0b2b, #2c1d42, #07172f);
      padding: 1.5rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      color: #ffffff;
    }
    nav a {
      margin: 0 1rem;
      text-decoration: none;
      color: #ccc;
      font-weight: 500;
      transition: 0.3s;
    }
    nav a:hover, nav a.active {
      color: #fc2872;
    }
    .signup-btn {
      background: linear-gradient(90deg, #fc2872, #8e44ec);
      padding: 0.6rem 1.2rem;
      border-radius: 30px;
      color: #fff;
      font-weight: bold;
      border: none;
      text-decoration: none;
    }
    .gallery {
      padding: 4rem 10%;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
    }
    .card {
      background: #1e1e2f;
      border-radius: 15px;
      padding: 1rem;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      transition: 0.3s ease;
      position: relative;
    }
    .card:hover {
      box-shadow: 0 0 12px #fc28725c;
    }
    .card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 0.5rem;
    }
    .prompt-text {
      font-size: 0.9rem;
      color: #ccc;
    }
    /* Download button styling */
    .download-btn {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 50%;
      padding: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .download-btn:hover {
      background: rgba(252, 40, 114, 0.8);
    }
    .download-btn svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }
    footer {
      padding: 1.2rem 5%;
      text-align: center;
      background: #0f0f1c;
      color: #aaa;
      font-size: 0.9rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      margin-top: 3rem;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">AI Image Generator</div>
  <nav>
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'FAQ' %}">Blog</a>
    <a href="{% url 'feedback' %}">Affiliate</a>
    <a href="{% url 'about' %}">About</a>
    <a href="{% url 'contact' %}">Contact Us</a>
    <a href="{% url 'history' %}" class="active">History</a>
  </nav>
  <a href="{% url 'signup' %}" class="signup-btn">SIGN UP</a>
</header>

<section class="gallery">
  {% for img in image_prompts %}
  <div class="card">
    <img src="{{ img.prompt_image.url }}" alt="Generated Image">
    <div class="prompt-text">{{ img.prompt }}</div>
    <small>{{ img.created_at|date:"Y-m-d H:i" }}</small>

    <!-- Download Button -->
    <div class="download-btn" onclick="downloadImage('{{ img.prompt_image.url }}')">
      <!-- Inline SVG for download icon -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M5 20h14v-2H5m14-9h-4V3H9v6H5l7 7 7-7z"/>
      </svg>
    </div>
  </div>
  {% empty %}
  <p>No images generated yet.</p>
  {% endfor %}
</section>

<footer>
  © 2025 AI Image Generator. All rights reserved.
</footer>

<script>
  function downloadImage(url) {
    const a = document.createElement('a');
    a.href = url;
    a.download = url.split('/').pop(); // File name from URL
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
</script>

</body>
</html>
