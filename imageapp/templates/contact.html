<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us - AI Image Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #1c0b2b, #07172f);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      background: linear-gradient(to right, #1c0b2b, #2c1d42, #07172f);
      padding: 1.5rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      position: sticky;
      top: 0;
      z-index: 999;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      color: #ffffff;
      letter-spacing: 1px;
    }

    nav a {
      margin: 0 1rem;
      text-decoration: none;
      color: #ccc;
      font-weight: 500;
      transition: 0.3s ease-in-out;
    }

    nav a:hover, nav a.active {
      color: #fc2872;
      text-shadow: 0 0 8px #fc2872;
    }

    .signup-btn {
      background: linear-gradient(90deg, #fc2872, #8e44ec);
      padding: 0.6rem 1.2rem;
      border-radius: 30px;
      color: #fff;
      font-weight: bold;
      border: none;
      text-decoration: none;
      box-shadow: 0 0 10px rgba(252, 40, 114, 0.4);
    }

    .contact-section {
      padding: 5rem 5%;
      background: linear-gradient(to bottom, #1c0b2b, #2e1346, #0f1a33);
      text-align: center;
    }

    .contact-section h2 {
      font-size: 2.8rem;
      margin-bottom: 1rem;
    }

    .contact-section p {
      max-width: 600px;
      margin: 0 auto 2rem;
      color: #c4c4c4;
    }

    .contact-form {
      max-width: 600px;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .contact-form input,
    .contact-form textarea {
      padding: 1rem;
      border: none;
      border-radius: 10px;
      background-color: #1e1e2f;
      color: #fff;
      font-size: 1rem;
    }

    .contact-form textarea {
      resize: vertical;
      min-height: 150px;
    }

    .contact-form button {
      padding: 1rem;
      background: linear-gradient(90deg, #fc2872, #8e44ec);
      color: #fff;
      font-weight: bold;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(140, 60, 230, 0.5);
      transition: transform 0.3s ease;
    }

    .contact-form button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(140, 60, 230, 0.8);
    }

    footer {
      text-align: center;
      padding: 2rem 5%;
      color: #888;
      font-size: 0.9rem;
      background: #0d0d1f;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">AI Image Generator</div>
    <nav>
      <a href="{% url 'home' %}">Home</a>
      <a href="{% url 'FAQ'  %}">Blog</a>
      <a href="{% url 'feedback'  %}">Affiliate</a>
      <a href="{% url 'about'  %}">About</a>
      <a href="{% url 'contact'  %}" class="active">Contact Us</a>
      <a href="{% url 'history'  %}">History</a>

    </nav>
    <a href="{% url 'signup' %}" class="signup-btn">SIGN UP</a>
  </header>

  <section class="contact-section">
    <h2>Get in Touch</h2>
    <p>Have questions, feedback, or partnership opportunities? We’d love to hear from you!</p>
    <form class="contact-form" action="" method="POST">
      {% csrf_token %}
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Your Message" required></textarea>
      <button type="submit">📩 Send Message</button>
    </form>
  </section>

  <footer>
    &copy; 2025 AI Image Generator. All rights reserved.
  </footer>

</body>
</html>
