<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feedback - AI Image Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #1c0b2b, #07172f);
      color: #fff;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(to right, #1c0b2b, #2c1d42, #07172f);
      padding: 1.5rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      color: #ffffff;
    }

    nav a {
      margin: 0 1rem;
      text-decoration: none;
      color: #ccc;
      font-weight: 500;
      transition: 0.3s ease;
    }

    nav a:hover, nav a.active {
      color: #fc2872;
      text-shadow: 0 0 6px #fc2872;
    }

    .signup-btn {
      background: linear-gradient(90deg, #fc2872, #8e44ec);
      padding: 0.6rem 1.2rem;
      border-radius: 30px;
      color: #fff;
      font-weight: bold;
      border: none;
      text-decoration: none;
    }

    .feedback-section {
      padding: 5rem 10% 3rem;
      max-width: 700px;
      margin: auto;
    }

    .feedback-section h1 {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 2rem;
    }

    .highlight {
      background: linear-gradient(90deg, #fc2872, #8e44ec);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    form {
      background: #1e1e2f;
      padding: 2rem;
      border-radius: 20px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
    }

    label {
      display: block;
      margin: 1rem 0 0.5rem;
      font-weight: 500;
    }

    input, textarea {
      width: 100%;
      padding: 0.9rem 1rem;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      background-color: #131323;
      color: #fff;
      outline: none;
    }

    input::placeholder, textarea::placeholder {
      color: #999;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    button {
      margin-top: 1.5rem;
      background: linear-gradient(90deg, #fc2872, #8e44ec);
      border: none;
      border-radius: 30px;
      padding: 0.8rem 2rem;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.3s ease;
    }

    button:hover {
      opacity: 0.9;
      box-shadow: 0 0 10px #fc2872;
    }

    footer {
      padding: 1.2rem 5%;
      text-align: center;
      background: #0f0f1c;
      color: #aaa;
      font-size: 0.9rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      margin-top: 3rem;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">AI Image Generator</div>
    <nav>
      <a href="{% url 'home' %}">Home</a>
      <a href="{% url 'FAQ'  %}">Blog</a>
      <a href="{% url 'feedback'  %}">Affiliate</a>
      <a href="{% url 'about'  %}">About</a>
      <a href="{% url 'contact'  %}">Contact Us</a>
      <a href="{% url 'history'  %}">History</a>
    </nav>
    <a href="{% url 'signup' %}" class="signup-btn">SIGN UP</a>
  </header>

  <section class="feedback-section">
    <h1>Give us your <span class="highlight">Feedback</span></h1>
    <form method="POST" action="">
      {% csrf_token %}
      <label for="name">Name</label>
      <input name="name" type="text" id="name" placeholder="Your name" required>

      <label for="email">Email</label>
      <input name="email" type="email" id="email" placeholder="Your email" required>

      <label for="feedback">Your Feedback</label>
      <textarea name="feedback" id="feedback" placeholder="Share your thoughts or suggestions..." required></textarea>

      <button type="submit">Send Feedback</button>
    </form>
  </section>

  <footer>
    © 2025 AI Image Generator. All rights reserved.
  </footer>

</body>
</html>
