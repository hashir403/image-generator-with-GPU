<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - AI Image Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #1c0b2b, #07172f);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .signup-container {
      background: linear-gradient(to bottom right, #2c1d42, #0f1a33);
      padding: 2rem 3rem;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(252, 40, 114, 0.2);
      width: 100%;
      max-width: 400px;
    }

    h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-family: 'Orbitron', sans-serif;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 0.8rem;
      border-radius: 8px;
      border: none;
      background: #1e1e2f;
      color: #fff;
      font-size: 1rem;
    }

    input::placeholder {
      color: #aaa;
    }

    button {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 30px;
      background: linear-gradient(90deg, #fc2872, #8e44ec);
      color: #fff;
      font-weight: bold;
      font-size: 1rem;
      margin-top: 1rem;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(252, 40, 114, 0.4);
      transition: transform 0.3s;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 0 15px rgba(252, 40, 114, 0.6);
    }

    .login-link {
      text-align: center;
      margin-top: 1.5rem;
      color: #ccc;
    }

    .login-link a {
      color: #fc2872;
      text-decoration: none;
      font-weight: bold;
    }

    .login-link a:hover {
      text-shadow: 0 0 5px #fc2872;
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <h2>Create an Account</h2>
    <form method="POST" action="">
      {% csrf_token %}
      <div class="form-group">
        <label for="username">Username</label>
        <input name="name" type="text" id="username" placeholder="Enter username" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input name="email" type="email" id="email" placeholder="Enter email" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input name="password" type="password" id="password" placeholder="Enter password" required />
      </div>
      <button type="submit">Sign Up</button>
    </form>
    <div class="login-link">
      Already have an account? <a href="{% url 'login' %}">Login here</a>
    </div>
  </div>
</body>
</html>
